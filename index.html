<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>뱀파이어 키우기 — VampireRaise</title>
  <meta name="description" content="플랫폼 위 뱀파이어를 키우고, 몰려오는 인간 웨이브를 막고, 물어서 노예로 만드는 방치형 게임" />
  <meta name="theme-color" content="#0b0710" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧛</text></svg>" />
  <style>html,body{background:#0b0710;color-scheme:dark}</style>
  <link rel="stylesheet" href="./assets/fonts/galmuri/galmuri.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <div class="game-root">
      <div class="tank-scale-wrapper" id="tankWrapper">
        <div id="tank">
          <div class="tank-bg"></div>
          <div class="layer-blocks-logic" id="layerLogic"></div>
          <div class="layer-blocks-platform" id="layerPlatform"></div>
          <div class="layer-chars" id="layerChars"></div>
          <div class="layer-fx" id="layerFx"></div>
          <div id="platform-grid-overlay" class="hidden"></div>
          <div class="rgb-tint" id="rgbTint"></div>
          <div class="tank-floor"></div>

          <!-- 게임 영역 내 오버레이 UI (Shrimprium 핫키 스타일) -->
          <header id="hud" class="ui-overlay">
            <span id="hudWave" class="hud-chip">🌊 1</span>
            <span id="hudHumans" class="hud-chip"></span>
            <span id="hudBlood" class="hud-chip">🩸 0</span>
          </header>
          <div id="hotkeys" class="ui-overlay">
            <button id="btnWave" class="hotkey" title="웨이브 시작">▶</button>
            <button id="btnAuto" class="hotkey" title="자동 웨이브">♻</button>
            <button id="btnSummon" class="hotkey" title="뱀파이어 소환">🧛<i id="summonCost"></i></button>
            <button id="btnDecorate" class="hotkey" title="꾸미기">🛠</button>
          </div>

          <div id="decorate-bar" class="ui-overlay hidden">
            <div class="decorate-controls" id="decorateControls">
              <button id="btnLogicLayer" class="deco-btn" title="논리 레이어">⚡</button>
              <span id="decoSelInfo" class="deco-sel-info"></span>
              <button id="btnRotate" class="deco-btn hidden">↻</button>
              <button id="btnStealth" class="deco-btn hidden">👻</button>
              <button id="btnSensorOp" class="deco-btn hidden">≥</button>
              <button id="btnSensorMinus" class="deco-btn hidden">−</button>
              <button id="btnSensorPlus" class="deco-btn hidden">＋</button>
              <button id="btnRetrieve" class="deco-btn hidden">📦</button>
              <button id="btnDecoDone" class="deco-btn">완료</button>
            </div>
            <div class="decorate-palette" id="decoratePalette"></div>
          </div>

          <section id="info-panel" class="ui-overlay hidden">
            <button id="btnInfoClose" class="info-close">✕</button>
            <div id="infoChar" class="info-char"></div>
          </section>
        </div>
      </div>
    </div>
    <div id="toast-layer"></div>
  </div>
  <script type="module" src="./src/index.js"></script>
</body>
</html>
