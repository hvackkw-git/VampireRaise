<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>뱀파이어 키우기 — VampireRaise</title>
  <meta name="description" content="플랫폼 위 뱀파이어를 키우고, 몰려오는 인간 웨이브를 막고, 물어서 노예로 만드는 방치형 게임" />
  <meta name="theme-color" content="#0b0710" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧛</text></svg>" />
  <style>html,body{background:#0b0710;color-scheme:dark}</style>
  <link rel="stylesheet" href="./assets/fonts/galmuri/galmuri.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <div class="game-root">
      <header id="hud">
        <div class="hud-stats">
          <span id="hudWave">🌊 웨이브 1</span>
          <span id="hudHumans"></span>
          <span id="hudBlood">🩸 0</span>
        </div>
        <div class="hud-buttons">
          <button id="btnWave" class="hud-btn">▶ 웨이브</button>
          <button id="btnAuto" class="hud-btn">자동 OFF</button>
          <button id="btnSummon" class="hud-btn">🧛 소환</button>
          <button id="btnDecorate" class="hud-btn">🛠 꾸미기</button>
        </div>
      </header>

      <div class="tank-scale-wrapper" id="tankWrapper">
        <div id="tank">
          <div class="tank-bg"></div>
          <div class="layer-blocks-logic" id="layerLogic"></div>
          <div class="layer-blocks-platform" id="layerPlatform"></div>
          <div class="layer-chars" id="layerChars"></div>
          <div class="layer-fx" id="layerFx"></div>
          <div id="platform-grid-overlay" class="hidden"></div>
          <div class="rgb-tint" id="rgbTint"></div>
          <div class="tank-floor"></div>
        </div>
      </div>

      <div id="decorate-bar" class="hidden">
        <div class="decorate-controls" id="decorateControls">
          <button id="btnLogicLayer" class="deco-btn" title="논리 레이어">⚡</button>
          <span id="decoSelInfo" class="deco-sel-info"></span>
          <button id="btnRotate" class="deco-btn hidden">↻ 회전</button>
          <button id="btnStealth" class="deco-btn hidden">👻 투명</button>
          <button id="btnSensorOp" class="deco-btn hidden">≥</button>
          <button id="btnSensorMinus" class="deco-btn hidden">−</button>
          <button id="btnSensorPlus" class="deco-btn hidden">＋</button>
          <button id="btnRetrieve" class="deco-btn hidden">📦 회수</button>
          <button id="btnDecoDone" class="deco-btn">완료</button>
        </div>
        <div class="decorate-palette" id="decoratePalette"></div>
      </div>

      <section id="info-panel">
        <div id="infoDefault" class="info-default">캐릭터를 탭하면 정보가 표시됩니다</div>
        <div id="infoChar" class="info-char hidden"></div>
      </section>
    </div>
    <div id="toast-layer"></div>
  </div>
  <script type="module" src="./src/index.js"></script>
</body>
</html>
