<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Vampire Shrimp Frenzy</title>
  <meta name="description" content="Raise Vamp Shrimp, stop waves of Holy Shrimp, and turn them into Jombie Shrimp." data-i18n-content="meta.description" />
  <meta name="theme-color" content="#0b0710" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦐</text></svg>" />
  <style>html,body{background:#0b0710;color-scheme:dark}</style>
  <link rel="stylesheet" href="./assets/fonts/galmuri/galmuri.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <div class="game-root">
      <!-- Shrimprium 방식: 수조(640) + 패널 영역(94)을 한 논리 캔버스(320×734)로 묶어 통째로 스케일 -->
      <div class="canvas-scale-wrapper" id="canvasWrapper">
        <div id="gameCanvas">
        <div class="tank-area" id="tankWrapper">
        <div id="tank">
          <div class="tank-bg"></div>
          <div class="layer-blocks-logic" id="layerLogic"></div>
          <div class="layer-blocks-platform" id="layerPlatform"></div>
          <div class="layer-chars" id="layerChars"></div>
          <div class="layer-fx" id="layerFx"></div>
          <div id="platform-grid-overlay" class="hidden"></div>
          <div class="rgb-tint" id="rgbTint"></div>
          <div class="tank-floor"></div>

          <!-- 게임 영역 최상단: 계정 레벨·경험치 바 (Shrimprium처럼 수조 위에 항상 표시) -->
          <div id="levelBar" class="ui-overlay">
            <b id="acctLevel">Lv.1</b>
            <div class="bar bar-acct"><i id="acctExpFill" style="width:0%"></i></div>
            <span id="acctExpNum">0 / 80</span>
          </div>
          <!-- 게임 영역 내 오버레이 UI -->
          <header id="hud" class="ui-overlay">
            <span id="hudWave" class="hud-chip">🌊 1</span>
            <span id="hudHumans" class="hud-chip"></span>
            <span id="hudBlood" class="hud-chip">🩸 0</span>
          </header>
          <!-- 웨이브 종료/대기 중에만 노출되는 중앙 큰 버튼: 좌=웨이브 시작, 우=재시작(Rebirth) -->
          <div id="waveCenterControls" class="ui-overlay hidden">
            <button id="btnWave" class="wave-center-btn" title="Start wave" data-i18n-title="controls.startWave">
              <span class="wcb-glyph">▶</span>
              <span class="wcb-label" data-i18n="controls.startWave">Start wave</span>
            </button>
            <button id="btnRebirth" class="wave-center-btn wcb-rebirth" title="Rebirth" data-i18n-title="controls.rebirth">
              <span class="wcb-glyph">🥚<i id="rebirthReq"></i></span>
              <span class="wcb-label" data-i18n="controls.rebirth">Rebirth</span>
            </button>
          </div>
          <div id="testControls" class="test-controls ui-overlay" aria-label="Test tools" data-i18n-aria-label="controls.testTools">
            <button id="btnLanguage" class="test-control" type="button" aria-label="Switch to Korean" title="Switch to Korean">KO</button>
            <button id="btnDetectRanges" class="test-control on" type="button" aria-pressed="true" aria-label="Hide detection ranges" title="Hide detection ranges">◎</button>
            <button id="btnAllVampireLevelUp" class="test-control test-level-up" type="button" aria-label="Level up all Vamp Shrimp by 1" title="Level up all Vamp Shrimp by 1" data-i18n-aria-label="controls.levelAll" data-i18n-title="controls.levelAll">LV+</button>
          </div>

        </div>
        </div>

        <!-- 패널 영역: 수조와 분리된 하단 상시 패널 (캐릭터 4열) -->
        <div id="panel-region">
          <div id="decorate-bar" class="hidden">
            <div class="decorate-controls" id="decorateControls">
              <button id="btnLogicLayer" class="deco-btn" title="Logic layer" data-i18n-title="controls.logicLayer">⚡</button>
              <span id="decoSelInfo" class="deco-sel-info"></span>
              <button id="btnRotate" class="deco-btn hidden">↻</button>
              <button id="btnStealth" class="deco-btn hidden">👻</button>
              <button id="btnSensorOp" class="deco-btn hidden">≥</button>
              <button id="btnSensorMinus" class="deco-btn hidden">−</button>
              <button id="btnSensorPlus" class="deco-btn hidden">＋</button>
              <button id="btnRetrieve" class="deco-btn hidden">📦</button>
              <button id="btnDecoDone" class="deco-btn" data-i18n="controls.done">Done</button>
            </div>
            <div class="decorate-palette" id="decoratePalette"></div>
          </div>
          <section id="info-panel">
            <!-- 캐릭터 선택 시: [스탯 바] [데미지] [장착 스킬] [핫키].
                 미선택 시: 스탯/데미지/장착 스킬 자리에 Vamp Shrimp 얼굴 2행6열([cardFaces])이 대신 나오고 핫키는 그대로. -->
            <div class="panel-grid">
              <div class="panel-card" id="cardStat">
                <div class="card-title card-title-name" id="statName">—</div>
                <div class="stat-row"><span class="stat-label">HP</span><div class="stat-bar sb-hp"><i id="pHpFill"></i><em id="pHpNum"></em></div></div>
                <div class="stat-row"><span class="stat-label">MP</span><div class="stat-bar sb-mp"><i id="pMpFill"></i><em id="pMpNum"></em></div></div>
                <div class="stat-row"><span class="stat-label">EXP</span><div class="stat-bar sb-exp"><i id="pExpFill"></i><em id="pExpNum"></em></div></div>
              </div>
              <div class="panel-card card-center" id="cardDmg">
                <div class="dmg-value" id="pAtk">—</div>
                <div class="dmg-sub">⚔ <span data-i18n="info.attack">ATK</span></div>
              </div>
              <div class="panel-card" id="cardSkill">
                <div class="slot-grid" id="skillGrid"></div>
                <div class="skill-name" id="skillName"></div>
              </div>
              <div class="panel-card" id="cardFaces">
                <div class="slot-grid face-grid" id="faceGrid"></div>
              </div>
              <div class="panel-card" id="cardHotkey">
                <!-- 핫키: 기존 우상단 조작 버튼들을 이 그리드(2행3열)로 이전 -->
                <div class="slot-grid" id="hotkeyGrid">
                  <button id="btnSkillTree" class="hotkey-slot assigned" title="Skill Tree" aria-label="Skill Tree" data-i18n-title="controls.skillTree" data-i18n-aria-label="controls.skillTree"><span class="hotkey-glyph">✦</span></button>
                  <button id="btnAuto" class="hotkey-slot assigned" title="Auto wave" data-i18n-title="controls.autoWave">♻</button>
                  <button id="btnDecorate" class="hotkey-slot assigned" title="Decorate" data-i18n-title="controls.decorate">🛠</button>
                  <button id="btnReset" class="hotkey-slot assigned hotkey-danger" title="Restart from scratch" data-i18n-title="controls.reset">🔄</button>
                </div>
                <div id="versionBadge">v0003</div>
              </div>
            </div>
          </section>
        </div>

        <section id="skillTreePanel" class="skill-tree-panel hidden" aria-label="Skill Tree" data-i18n-aria-label="controls.skillTree">
          <header class="skill-tree-header">
            <div class="skill-tree-heading">
              <h2 data-i18n="skillTree.title">Skill Tree</h2>
              <span id="skillTreeOwner">—</span>
            </div>
            <div class="skill-tree-level">LV <strong id="skillTreeLevel">1</strong></div>
            <div class="skill-tree-points">SP <strong id="skillTreePoints">0</strong></div>
            <button id="btnSkillTreeClose" class="skill-tree-close" type="button" aria-label="Close Skill Tree" title="Close" data-i18n-aria-label="controls.closeSkillTree" data-i18n-title="controls.close">×</button>
          </header>
          <div id="skillTreeBoard" class="skill-tree-board">
            <svg class="skill-tree-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              <g id="skillTreeLines"></g>
            </svg>
            <div id="skillTreeNodes" class="skill-tree-nodes"></div>
          </div>
          <section id="dashColorAlloc" class="dash-alloc" aria-label="Dash skill summary" data-i18n-aria-label="controls.dashSummary">
            <header class="dash-alloc-head">
              <h3 data-i18n="skillTree.dashSkills">Dash Skills</h3>
              <div class="dash-alloc-points"><span data-i18n="skillTree.ghosts">Ghosts</span> <strong id="dashGhostN">0</strong></div>
              <button id="btnDashReset" class="dash-alloc-reset" type="button" data-i18n="skillTree.reset">Reset</button>
            </header>
          </section>
          <footer class="skill-tree-footer">
            <span id="skillTreeDetail" class="skill-tree-detail" data-i18n="skillTree.investHint">Select a slot to invest</span>
            <button id="btnSkillTreeLevelUp" class="skill-tree-level-up" type="button" title="Test level +1" data-i18n-title="controls.testLevelUp">LV +1</button>
          </footer>
        </section>
        </div>
      </div>
    </div>
    <div id="toast-layer"></div>
  </div>
  <script type="module" src="./src/index.js"></script>
</body>
</html>
