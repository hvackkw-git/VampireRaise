<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Vampire Shrimp Frenzy</title>
  <meta name="description" content="Raise Vamp Shrimp, stop waves of Holy Shrimp, and turn them into Jombie Shrimp." data-i18n-content="meta.description" />
  <meta name="theme-color" content="#0b0710" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦐</text></svg>" />
  <style>html,body{background:#0b0710;color-scheme:dark}</style>
  <link rel="stylesheet" href="./assets/fonts/galmuri/galmuri.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <div class="game-root">
      <!-- Shrimprium 방식: 수조(640) + 패널 영역(94)을 한 논리 캔버스(320×734)로 묶어 통째로 스케일 -->
      <div class="canvas-scale-wrapper" id="canvasWrapper">
        <div id="gameCanvas">
        <div class="tank-area" id="tankWrapper">
        <div id="tank">
          <div class="tank-bg"></div>
          <div class="layer-blocks-logic" id="layerLogic"></div>
          <div class="layer-blocks-platform" id="layerPlatform"></div>
          <div class="layer-chars" id="layerChars"></div>
          <div class="layer-fx" id="layerFx"></div>
          <div id="platform-grid-overlay" class="hidden"></div>
          <div class="rgb-tint" id="rgbTint"></div>
          <div class="tank-floor"></div>

          <!-- 게임 영역 최상단: 계정 레벨·경험치 바 (Shrimprium처럼 수조 위에 항상 표시) -->
          <div id="levelBar" class="ui-overlay">
            <b id="acctLevel">Lv.1</b>
            <div class="bar bar-acct"><i id="acctExpFill" style="width:0%"></i></div>
            <span id="acctExpNum">0 / 80</span>
          </div>
          <!-- 게임 영역 내 오버레이 UI -->
          <header id="hud" class="ui-overlay">
            <span id="hudWave" class="hud-chip">🌊 1</span>
            <span id="hudHumans" class="hud-chip"></span>
            <span id="hudBlood" class="hud-chip">🩸 0</span>
          </header>
          <!-- 웨이브 종료/대기 중에만 노출되는 중앙 픽셀 스프라이트 버튼: 좌=꾸미기(망치), 가운데=웨이브 시작(재생), 우=환생(나비).
               스프라이트 자체가 버튼(박스 없음). 스프라이트는 sprites.js에서 주입. -->
          <div id="waveCenterControls" class="ui-overlay hidden">
            <button id="btnDecorate" class="sprite-btn" type="button" title="Decorate" aria-label="Decorate" data-i18n-title="controls.decorate" data-i18n-aria-label="controls.decorate"></button>
            <button id="btnWave" class="sprite-btn" type="button" title="Start wave" aria-label="Start wave" data-i18n-title="controls.startWave" data-i18n-aria-label="controls.startWave"></button>
            <button id="btnRebirth" class="sprite-btn" type="button" title="Rebirth" aria-label="Rebirth" data-i18n-title="controls.rebirth" data-i18n-aria-label="controls.rebirth"><i id="rebirthReq"></i></button>
          </div>
          <div id="testControls" class="test-controls ui-overlay" aria-label="Test tools" data-i18n-aria-label="controls.testTools">
            <button id="btnLanguage" class="test-control" type="button" aria-label="Switch to Korean" title="Switch to Korean">KO</button>
            <button id="btnReset" class="test-control test-reset" type="button" aria-label="Restart from scratch" title="Restart from scratch" data-i18n-title="controls.reset" data-i18n-aria-label="controls.reset">↻</button>
            <button id="btnDetectRanges" class="test-control on" type="button" aria-pressed="true" aria-label="Hide detection ranges" title="Hide detection ranges">◎</button>
            <button id="btnAllVampireLevelUp" class="test-control test-level-up" type="button" aria-label="Level up all Vamp Shrimp by 1" title="Level up all Vamp Shrimp by 1" data-i18n-aria-label="controls.levelAll" data-i18n-title="controls.levelAll">LV+</button>
          </div>

        </div>
        </div>

        <!-- 패널 영역: 수조와 분리된 하단 상시 패널 (캐릭터 4열) -->
        <div id="panel-region">
          <div id="decorate-bar" class="hidden">
            <div class="decorate-controls" id="decorateControls">
              <button id="btnLogicLayer" class="deco-btn" title="Logic layer" data-i18n-title="controls.logicLayer">⚡</button>
              <span id="decoSelInfo" class="deco-sel-info"></span>
              <button id="btnRotate" class="deco-btn hidden">↻</button>
              <button id="btnStealth" class="deco-btn hidden">👻</button>
              <button id="btnSensorOp" class="deco-btn hidden">≥</button>
              <button id="btnSensorMinus" class="deco-btn hidden">−</button>
              <button id="btnSensorPlus" class="deco-btn hidden">＋</button>
              <button id="btnRetrieve" class="deco-btn hidden">📦</button>
              <button id="btnDecoDone" class="deco-btn" data-i18n="controls.done">Done</button>
            </div>
            <div class="decorate-palette" id="decoratePalette"></div>
          </div>
          <section id="info-panel">
            <!-- 캐릭터 선택 시: [스탯/전투 지표] [장착 스킬] [핫키].
                 미선택 시: 스탯/데미지/장착 스킬 자리에 Vamp Shrimp 얼굴 5칸([cardFaces])이 대신 나오고 핫키는 그대로. -->
            <div class="panel-grid">
              <div class="panel-card" id="cardStat">
                <div class="card-title card-title-name"><span id="statName">—</span><span id="statLevel">Lv.1</span></div>
                <div class="stat-mix-grid">
                  <div class="stat-mix-cell stat-bar-cell"><span class="stat-label">HP</span><div class="stat-bar sb-hp"><i id="pHpFill"></i><em id="pHpNum"></em></div></div>
                  <div class="stat-mix-cell stat-value-cell"><span>ATK</span><b id="pAtk">—</b></div>
                  <div class="stat-mix-cell stat-bar-cell"><span class="stat-label">MP</span><div class="stat-bar sb-mp"><i id="pMpFill"></i><em id="pMpNum"></em></div></div>
                  <div class="stat-mix-cell stat-value-cell"><span>ARM</span><b id="pArm">—</b></div>
                  <div class="stat-mix-cell stat-bar-cell"><span class="stat-label">EXP</span><div class="stat-bar sb-exp"><i id="pExpFill"></i><em id="pExpNum"></em></div></div>
                  <div class="stat-mix-cell stat-value-cell"><span>SPD</span><b id="pSpd">—</b></div>
                </div>
              </div>
              <div class="panel-card" id="cardSkill">
                <div class="slot-grid" id="skillGrid"></div>
                <div class="skill-name" id="skillName"></div>
              </div>
              <div class="panel-card" id="cardFaces">
                <div class="slot-grid face-grid" id="faceGrid"></div>
              </div>
              <div class="panel-card" id="cardHotkey">
                <!-- 핫키: 주 전투 조작 버튼 -->
                <div class="slot-grid" id="hotkeyGrid">
                  <button id="btnStat" class="hotkey-slot assigned stat-hotkey" title="Stats" aria-label="Stats" data-i18n-title="controls.stats" data-i18n-aria-label="controls.stats"><span class="hotkey-glyph">STAT</span></button>
                  <button id="btnSkillTree" class="hotkey-slot assigned skill-hotkey" title="Skill Tree" aria-label="Skill Tree" data-i18n-title="controls.skillTree" data-i18n-aria-label="controls.skillTree"><span class="hotkey-glyph">SKILL</span></button>
                </div>
                <div id="versionBadge">v0008</div>
              </div>
            </div>
          </section>
        </div>

        <section id="statPanel" class="stat-panel hidden" aria-label="Stats" data-i18n-aria-label="controls.stats">
          <header class="stat-panel-header">
            <div class="stat-panel-heading">
              <h2 data-i18n="statPanel.title">Stats</h2>
              <span id="statPanelOwner">—</span>
            </div>
            <div class="stat-panel-level">LV <strong id="statPanelLevel">1</strong></div>
            <div class="stat-panel-points">AP <strong id="statPanelPoints">0</strong></div>
            <button id="btnStatPanelClose" class="stat-panel-close" type="button" aria-label="Close Stats" title="Close" data-i18n-aria-label="controls.closeStats" data-i18n-title="controls.close">×</button>
          </header>
          <div class="stat-attribute-list">
            <section class="stat-attribute stat-strength" data-stat-key="str">
              <div class="stat-attribute-copy"><h3 class="stat-attribute-name">Strength</h3><p class="stat-attribute-effect"></p></div>
              <strong class="stat-attribute-value">0</strong>
              <button class="stat-invest-btn" type="button">+</button>
            </section>
            <section class="stat-attribute stat-agility" data-stat-key="agi">
              <div class="stat-attribute-copy"><h3 class="stat-attribute-name">Agility</h3><p class="stat-attribute-effect"></p></div>
              <strong class="stat-attribute-value">0</strong>
              <button class="stat-invest-btn" type="button">+</button>
            </section>
            <section class="stat-attribute stat-intelligence" data-stat-key="int">
              <div class="stat-attribute-copy"><h3 class="stat-attribute-name">Intelligence</h3><p class="stat-attribute-effect"></p></div>
              <strong class="stat-attribute-value">0</strong>
              <button class="stat-invest-btn" type="button">+</button>
            </section>
          </div>
          <section class="stat-summary" aria-label="Current combat stats" data-i18n-aria-label="statPanel.summary">
            <h3 data-i18n="statPanel.summary">Current combat stats</h3>
            <div class="stat-summary-grid">
              <div><span>HP</span><strong id="statSummary-hp">0</strong></div>
              <div><span>ATK</span><strong id="statSummary-atk">0</strong></div>
              <div><span>ARM</span><strong id="statSummary-armor">0</strong></div>
              <div><span>ATK SPD</span><strong id="statSummary-attackSpeed">×1.00</strong></div>
              <div><span>MOVE</span><strong id="statSummary-moveSpeed">0</strong></div>
              <div><span>DASH</span><strong id="statSummary-dashSpeed">0</strong></div>
              <div><span>DETECT</span><strong id="statSummary-detect">0</strong></div>
              <div><span>MP</span><strong id="statSummary-mp">0</strong></div>
              <div><span>MP REG</span><strong id="statSummary-regen">0/s</strong></div>
              <div><span>MAG</span><strong id="statSummary-magicAtk">0</strong></div>
            </div>
          </section>
        </section>

        <section id="skillTreePanel" class="skill-tree-panel hidden" aria-label="Skill Tree" data-i18n-aria-label="controls.skillTree">
          <header class="skill-tree-header">
            <div class="skill-tree-heading">
              <h2 data-i18n="skillTree.title">Skill Tree</h2>
              <span id="skillTreeOwner">—</span>
            </div>
            <div class="skill-tree-level">LV <strong id="skillTreeLevel">1</strong></div>
            <div class="skill-tree-points">SP <strong id="skillTreePoints">0</strong></div>
            <button id="btnSkillTreeClose" class="skill-tree-close" type="button" aria-label="Close Skill Tree" title="Close" data-i18n-aria-label="controls.closeSkillTree" data-i18n-title="controls.close">×</button>
          </header>
          <div id="skillTreeBoard" class="skill-tree-board">
            <svg class="skill-tree-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              <g id="skillTreeLines"></g>
            </svg>
            <div id="skillTreeNodes" class="skill-tree-nodes"></div>
          </div>
          <section id="dashColorAlloc" class="dash-alloc" aria-label="Dash skill summary" data-i18n-aria-label="controls.dashSummary">
            <header class="dash-alloc-head">
              <h3 data-i18n="skillTree.dashSkills">Dash Skills</h3>
              <div class="dash-alloc-points"><span data-i18n="skillTree.ghosts">Ghosts</span> <strong id="dashGhostN">0</strong></div>
              <button id="btnDashReset" class="dash-alloc-reset" type="button" data-i18n="skillTree.reset">Reset</button>
            </header>
          </section>
          <footer class="skill-tree-footer">
            <span id="skillTreeDetail" class="skill-tree-detail" data-i18n="skillTree.investHint">Select a skill to view its details</span>
            <button id="btnSkillTreeLevelUp" class="skill-tree-level-up" type="button" title="Skill +1" data-i18n="controls.skillLevelUp" data-i18n-title="controls.skillLevelUp">SKILL +1</button>
          </footer>
        </section>
        </div>
      </div>
    </div>
    <div id="toast-layer"></div>
  </div>
  <script type="module" src="./src/index.js"></script>
</body>
</html>
